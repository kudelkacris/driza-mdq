<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect width="300" height="300" fill="#0a0a0a"/>
  
  <!-- Perfume bottle silhouette -->
  <!-- Cap -->
  <rect x="143" y="28" width="14" height="8" rx="2" fill="#ffffff"/>
  <!-- Neck -->
  <rect x="146" y="36" width="8" height="10" fill="#ffffff"/>
  <!-- Spray arm -->
  <rect x="154" y="38" width="12" height="4" rx="2" fill="#ffffff"/>
  <!-- Body -->
  <rect x="138" y="46" width="24" height="32" rx="3" fill="#ffffff"/>
  <!-- Highlight on bottle -->
  <rect x="141" y="49" width="4" height="22" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Decorative D letter - main shape -->
  <!-- The D: vertical bar -->
  <rect x="108" y="88" width="16" height="110" rx="4" fill="#ffffff"/>
  
  <!-- D curve - using a path for elegant look -->
  <path d="M 124 88 Q 185 88 185 143 Q 185 198 124 198" 
        stroke="#ffffff" stroke-width="16" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative swash/flourish at bottom of D -->
  <path d="M 108 198 Q 100 198 96 205 Q 90 215 105 218 Q 118 220 130 212" 
        stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Thin gold line above text -->
  <line x1="90" y1="228" x2="210" y2="228" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>

  <!-- DRIZA text -->
  <text x="150" y="253" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="34" 
        font-weight="bold"
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="6">DRIZA</text>

  <!-- MDQ text -->
  <text x="150" y="271" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="13" 
        fill="#cccccc" 
        text-anchor="middle" 
        letter-spacing="8">MDQ</text>

  <!-- Thin line -->
  <line x1="105" y1="278" x2="195" y2="278" stroke="#444444" stroke-width="0.5"/>

  <!-- FRAGANCIAS text -->
  <text x="150" y="292" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="10" 
        fill="#aaaaaa" 
        text-anchor="middle" 
        letter-spacing="4">FRAGANCIAS</text>
</svg>
